ibkr:
  host: 127.0.0.1

  # Python 程序 paper 模式连接的 host 端口。
  paper_host_port: 4002

  # Python 程序 live 模式连接的 host 端口。
  live_host_port: 4001

  # IBKR API clientId。一个 Gateway 会话内不同程序不要重复。
  client_id: 10

  # 3 = delayed market data，便于无实时行情订阅时先跑通。
  market_data_type: 3

paths:
  log_dir: /var/log/alphaforge
  state_dir: /var/lib/alphaforge
  audit_log: /var/log/alphaforge/audit.jsonl
  trade_log: /var/log/alphaforge/trade.jsonl
  grid_config: /etc/alphaforge/grid.yaml
  kill_switch: /var/lib/alphaforge/kill-switch

strategy:
  # grid_v1 的详细参数在 /etc/alphaforge/grid.yaml。
  name: grid_v1

risk:
  max_positions: 3
  max_symbol_position_pct: 0.10
  max_gross_exposure_pct: 0.30
  daily_loss_limit_pct: 0.01
  max_spread_bps: 5
